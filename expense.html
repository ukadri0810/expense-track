<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Expense</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#1f7a5c"><link rel="stylesheet" href="styles.css"></head><body><main class="app"><section class="top"><small>Today actual spend</small><h1>Add Expense</h1><p>Add only what you actually spent today. This page compares it with your daily limit.</p></section><section class="card"><h2>New Expense</h2><div class="row"><div><label>Name</label><input id="name" placeholder="Extra snacks, petrol, online food"></div><div><label>Amount</label><input id="amount" type="number" placeholder="250"></div></div><div class="row"><div><label>Category</label><select id="category"><option value="food">Food</option><option value="snacks">Snacks</option><option value="travel">Travel</option><option value="badHabit">Bad Habit</option><option value="needs">Needs</option><option value="wants">Wants</option><option value="debt">Debt</option></select></div><div><label>Date</label><input id="date" type="date"></div></div><button onclick="add()">Save Expense</button></section><section class="card"><h2>Today’s Expenses</h2><div id="list"></div></section></main><div id="nav"></div><script src="app.js"></script><script>navBox=document.getElementById('nav');navBox.innerHTML=nav('expense');date.value=todayISO;function add(){if(!name.value.trim()||!Number(amount.value)){alert('Enter expense name and amount');return}state.expenses.unshift({id:Date.now(),name:name.value.trim(),amount:Number(amount.value),category:category.value,date:date.value||todayISO});save();location.reload()}function del(id){state.expenses=state.expenses.filter(e=>e.id!==id);save();location.reload()}const arr=state.expenses.filter(e=>e.date===todayISO);list.innerHTML=arr.length?arr.map(e=>`<div class="item"><div><strong>${e.name}</strong><small>${e.category} • ${e.date}</small><br><span class="tag">${rupee(e.amount)}</span></div><button class="danger" onclick="del(${e.id})">Delete</button></div>`).join(''):'<div class="empty">No expenses added today.</div>';</script></body></html>
