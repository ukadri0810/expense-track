<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recurring Daily</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#1f7a5c"><link rel="stylesheet" href="styles.css"></head><body><main class="app"><section class="top"><small>Daily fixed habits</small><h1>Recurring Daily</h1><p>Add fixed daily spends like smoking ₹30, snacks ₹50, tea ₹20, food ordering ₹100.</p></section><section class="card"><h2>Add Daily Recurring</h2><div class="row"><div><label>Name</label><input id="name" placeholder="Smoking, snacks, tea"></div><div><label>Daily Amount</label><input id="amount" type="number" placeholder="30"></div></div><div class="row"><div><label>Category</label><select id="category"><option value="wants">Wants</option><option value="needs">Needs</option><option value="badHabit">Bad Habit</option><option value="food">Food</option><option value="travel">Travel</option></select></div><div><label>Frequency</label><select id="frequency"><option value="daily">Every day</option><option value="workdays">Only workdays</option></select></div></div><button onclick="add()">Save Recurring</button></section><section class="card"><h2>Daily Limit</h2><div class="big"> <span id="limit"></span></div><p class="sub">This becomes your planned daily spend limit.</p></section><section class="card"><h2>Recurring List</h2><div id="list"></div></section></main><div id="nav"></div><script src="app.js"></script><script>document.getElementById('nav').innerHTML=nav('recurring');limit.innerText=rupee(dailyLimit());function add(){if(!name.value.trim()||!Number(amount.value)){alert('Enter recurring name and amount');return}state.recurring.unshift({id:Date.now(),name:name.value.trim(),amount:Number(amount.value),category:category.value,frequency:frequency.value});save();location.reload()}function del(id){state.recurring=state.recurring.filter(e=>e.id!==id);save();location.reload()}list.innerHTML=state.recurring.length?state.recurring.map(e=>`<div class="item"><div><strong>${e.name}</strong><small>${rupee(e.amount)} per day • ${e.category}</small><br><span class="tag orange">${rupee(e.amount*(e.frequency==='workdays'?22:30))}/month</span></div><button class="danger" onclick="del(${e.id})">Delete</button></div>`).join(''):'<div class="empty">No recurring expenses added.</div>';</script></body></html>
