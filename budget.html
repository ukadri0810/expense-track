<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Budget</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#1f7a5c"><link rel="stylesheet" href="styles.css"></head><body><main class="app"><section class="top"><small>Salary planning</small><h1>Budget Split</h1><p>Set salary and divide income into Needs, Wants and Savings.</p></section><section class="card"><label>Monthly Salary</label><input id="salaryInput" type="number" placeholder="30000"><button onclick="saveSalary()">Save Salary</button></section><section class="card"><h2>Percentage Split</h2><label>Needs: <span id="nT"></span></label><input id="needs" type="range" min="0" max="100"><label>Wants: <span id="wT"></span></label><input id="wants" type="range" min="0" max="100"><label>Savings: <span id="sT"></span></label><input id="savings" type="range" min="0" max="100"><div id="warning" class="insight"></div></section><section class="card"><h2>Planned Amounts</h2><div id="planned"></div></section></main><div id="nav"></div><script src="app.js"></script><script>document.getElementById('nav').innerHTML=nav('budget');salaryInput.value=state.salary||'';needs.value=state.budget.needs;wants.value=state.budget.wants;savings.value=state.budget.savings;function draw(){nT.innerText=needs.value+'%';wT.innerText=wants.value+'%';sT.innerText=savings.value+'%';let total=Number(needs.value)+Number(wants.value)+Number(savings.value);warning.innerHTML=total===100?'Budget split is balanced at <b>100%</b>.':'Current total is <b>'+total+'%</b>. Adjust it to 100%.';planned.innerHTML=`<div class="item"><div><strong>Needs</strong><small>${needs.value}% of salary</small></div><span class="tag">${rupee(state.salary*needs.value/100)}</span></div><div class="item"><div><strong>Wants</strong><small>${wants.value}% of salary</small></div><span class="tag orange">${rupee(state.salary*wants.value/100)}</span></div><div class="item"><div><strong>Savings</strong><small>${savings.value}% of salary</small></div><span class="tag green">${rupee(state.salary*savings.value/100)}</span></div>`}function persist(){state.budget={needs:Number(needs.value),wants:Number(wants.value),savings:Number(savings.value)};save();draw()}function saveSalary(){state.salary=Number(salaryInput.value||0);save();draw()}needs.oninput=persist;wants.oninput=persist;savings.oninput=persist;draw();</script></body></html>
