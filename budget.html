<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Budget</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#197653"><link rel="stylesheet" href="styles.css"></head><body><div class="wrap"><section class="top"><small>Separate page</small><h1>Budget</h1><p>Set salary and split it into Needs, Wants and Savings.</p></section><div id="nav-placeholder"></div><section class="grid"><div class="card span-6"><h2>Salary Setup</h2><label>Monthly Salary</label><input id="salary" type="number" placeholder="30000"><button class="primary" style="width:100%;margin-top:12px" onclick="saveBudget()">Save Budget</button></div><div class="card span-6"><h2>Budget Split</h2><div><label>Needs <span id="needsT"></span></label><input id="needs" type="range" min="0" max="100"></div><div style="margin-top:14px"><label>Wants <span id="wantsT"></span></label><input id="wants" type="range" min="0" max="100"></div><div style="margin-top:14px"><label>Savings <span id="savingsT"></span></label><input id="savings" type="range" min="0" max="100"></div><div id="warn" class="insight"></div></div><div class="card span-12"><h2>Budget Progress</h2><div id="progress"></div></div></section></div><script src="app.js"></script><script>window.PAGE='budget';fetch('nav.html').then(r=>r.text()).then(h=>document.getElementById('nav-placeholder').innerHTML=h).then(()=>document.querySelector('[data-page=budget]').classList.add('active'));salary.value=state.salary||'';needs.value=state.budget.needs;wants.value=state.budget.wants;savings.value=state.budget.savings;function refresh(){needsT.innerText=needs.value+'%';wantsT.innerText=wants.value+'%';savingsT.innerText=savings.value+'%';let total=Number(needs.value)+Number(wants.value)+Number(savings.value);warn.innerHTML=total===100?'Perfect. Split is <strong>100%</strong>.':`Current split is <strong>${total}%</strong>. Keep it 100%.`}needs.oninput=wants.oninput=savings.oninput=refresh;refresh();function saveBudget(){state.salary=Number(salary.value||0);state.budget={needs:Number(needs.value),wants:Number(wants.value),savings:Number(savings.value)};localStorage.setItem('spendwiseDailyV3',JSON.stringify(state));location.reload()}const cats=[['needs','Needs','blue'],['wants','Wants','orange'],['savings','Savings','green'],['debt','Debt','red']];progress.innerHTML=cats.map(c=>{let amount=c[0]==='debt'?state.salary*.15:state.salary*((state.budget[c[0]]||0)/100),spent=catSpend(c[0]),pct=amount?Math.min(spent/amount*100,100):0,left=amount-spent;return `<div class="item"><div class="row"><div><strong>${c[1]}</strong><br><small>${rupee(spent)} used from ${rupee(amount)}</small></div><span class="tag ${left<0?'tag-red':'tag-blue'}">${left<0?'Over '+rupee(Math.abs(left)):'Left '+rupee(left)}</span></div><div class="meter"><div class="bar ${left<0?'red':c[2]}" style="width:${pct}%"></div></div></div>`}).join('');if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');</script></body></html>
