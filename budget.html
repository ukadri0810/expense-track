<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Budget</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#197653"><link rel="stylesheet" href="styles.css"></head><body><div class="wrap"><section class="top"><small>Dedicated screen</small><h1>Budget</h1><p>Set salary and split it into Needs, Wants and Savings.</p></section><section class="grid"><div class="card span-6"><h2>Salary Setup</h2><label>Monthly Salary</label><input id="salary" type="number" placeholder="30000"><button class="primary" style="width:100%;margin-top:12px" onclick="saveBudget()">Save Budget</button></div><div class="card span-6"><h2>Budget Split</h2><div><label>Needs <span id="needsT"></span></label><input id="needs" type="range" min="0" max="100"></div><div style="margin-top:14px"><label>Wants <span id="wantsT"></span></label><input id="wants" type="range" min="0" max="100"></div><div style="margin-top:14px"><label>Savings <span id="savingsT"></span></label><input id="savings" type="range" min="0" max="100"></div><div id="warn" class="insight"></div></div><div class="card span-12"><h2>Budget Progress</h2><div id="progress"></div></div></section></div><script src="app.js"></script><script>
window.PAGE='budget';
loadNav();
const salaryEl=document.getElementById('salary');
const needsEl=document.getElementById('needs');
const wantsEl=document.getElementById('wants');
const savingsEl=document.getElementById('savings');
salaryEl.value=state.salary||'';needsEl.value=state.budget.needs;wantsEl.value=state.budget.wants;savingsEl.value=state.budget.savings;
function refresh(){document.getElementById('needsT').innerText=needsEl.value+'%';document.getElementById('wantsT').innerText=wantsEl.value+'%';document.getElementById('savingsT').innerText=savingsEl.value+'%';let total=Number(needsEl.value)+Number(wantsEl.value)+Number(savingsEl.value);document.getElementById('warn').innerHTML=total===100?'Perfect. Split is <strong>100%</strong>.':`Current split is <strong>${total}%</strong>. Keep it 100%.`}
needsEl.oninput=wantsEl.oninput=savingsEl.oninput=refresh;refresh();
function saveBudget(){state.salary=Number(salaryEl.value||0);state.budget={needs:Number(needsEl.value),wants:Number(wantsEl.value),savings:Number(savingsEl.value)};persist();alert('Budget saved successfully');renderProgress()}
function renderProgress(){const cats=[['needs','Needs','blue'],['wants','Wants','orange'],['savings','Savings','green'],['debt','Debt','red']];document.getElementById('progress').innerHTML=cats.map(c=>{let amount=c[0]==='debt'?state.salary*.15:state.salary*((state.budget[c[0]]||0)/100),spent=catSpend(c[0]),pct=amount?Math.min(spent/amount*100,100):0,left=amount-spent;return `<div class="item"><div class="row"><div><strong>${c[1]}</strong><br><small>${rupee(spent)} used from ${rupee(amount)}</small></div><span class="tag ${left<0?'tag-red':'tag-blue'}">${left<0?'Over '+rupee(Math.abs(left)):'Left '+rupee(left)}</span></div><div class="meter"><div class="bar ${left<0?'red':c[2]}" style="width:${pct}%"></div></div></div>`}).join('')}
renderProgress();registerPWA();
</script></body></html>
