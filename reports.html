<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#197653"><link rel="stylesheet" href="styles.css"></head><body><div class="wrap"><section class="top"><small>Separate page</small><h1>Reports</h1><p>Understand daily leakage, monthly impact and simple spending warnings.</p></section><div id="nav-placeholder"></div><section class="grid"><div class="card span-4 stat"><p class="sub">Daily Limit</p><h3 id="dailyLimitText">₹0</h3></div><div class="card span-4 stat"><p class="sub">Today Spent</p><h3 id="todaySpendText">₹0</h3></div><div class="card span-4 stat"><p class="sub">Monthly Habit Cost</p><h3 id="monthlyHabitText">₹0</h3></div><div class="card span-12"><h2>Smart Money Report</h2><div id="report"></div></div></section></div><script src="app.js"></script><script>window.PAGE='reports';fetch('nav.html').then(r=>r.text()).then(h=>document.getElementById('nav-placeholder').innerHTML=h).then(()=>document.querySelector('[data-page=reports]').classList.add('active'));initCommon();let l=dailyLimit(),t=todaySpend(),m=monthlyRecurring(),bad=state.recurring.filter(x=>x.category==='badHabit').reduce((s,x)=>s+x.amount*(x.frequency==='workdays'?22:30),0),arr=[];if(!state.salary)arr.push('Add salary from Budget page to compare spending with income.');if(!state.recurring.length)arr.push('Add daily recurring expenses to calculate planned daily limit.');if(l&&t>l)arr.push(`Today limit crossed by <strong>${rupee(t-l)}</strong>. If repeated daily, it becomes <strong>${rupee((t-l)*30)}</strong> extra monthly.`);if(l&&t<=l)arr.push(`You are under today’s limit by <strong>${rupee(l-t)}</strong>.`);if(m)arr.push(`Your recurring daily habits cost <strong>${rupee(m)}</strong> monthly and <strong>${rupee(m*12)}</strong> yearly.`);if(bad)arr.push(`Bad habit monthly cost is <strong>${rupee(bad)}</strong>. Reducing 50% saves <strong>${rupee(bad/2)}</strong> monthly.`);report.innerHTML=arr.map(x=>`<div class="insight">${x}</div>`).join('')||'<div class="empty">No report yet.</div>';if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');</script></body></html>
