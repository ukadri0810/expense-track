<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#1f7a5c"><link rel="stylesheet" href="styles.css"></head><body><main class="app"><section class="top"><small>Money insights</small><h1>Reports</h1><p>See daily limit crossing, monthly habit cost, yearly leakage and category spending.</p></section><section class="grid"><div class="card stat"><p>Daily Limit</p><h3 id="limit"></h3></div><div class="card stat"><p>Today Spent</p><h3 id="spent"></h3></div><div class="card stat"><p>Monthly Habits</p><h3 id="monthly"></h3></div><div class="card stat"><p>Yearly Impact</p><h3 id="yearly"></h3></div></section><section class="card"><h2>Smart Report</h2><div id="insights"></div></section><section class="card"><h2>Category Spending</h2><div id="cats"></div></section></main><div id="nav"></div><script src="app.js"></script><script>document.getElementById('nav').innerHTML=nav('reports');const l=dailyLimit(),t=todaySpend(),m=recurringMonthly();limit.innerText=rupee(l);spent.innerText=rupee(t);monthly.innerText=rupee(m);yearly.innerText=rupee(m*12);let arr=[];if(t>l&&l)arr.push(`Today limit crossed by <b>${rupee(t-l)}</b>. If repeated daily, it can become <b>${rupee((t-l)*30)}</b> extra/month.`);if(l&&t<=l)arr.push(`You are under today's limit by <b>${rupee(l-t)}</b>.`);if(m>0)arr.push(`Recurring habits cost <b>${rupee(m)}</b>/month. Reducing 50% saves <b>${rupee(m/2)}</b>/month.`);if(state.salary&&m>state.salary*.25)arr.push('Recurring daily expenses are taking more than 25% of salary. This needs attention.');if(!arr.length)arr.push('Add salary, recurring expenses and today expenses to generate useful reports.');insights.innerHTML=arr.map(x=>`<div class="insight">${x}</div>`).join('');const categories=['food','snacks','travel','badHabit','needs','wants','debt','savings'];cats.innerHTML=categories.map(c=>`<div class="item"><div><strong>${c}</strong><small>Total recorded spending</small></div><span class="tag">${rupee(spentCat(c))}</span></div>`).join('');</script></body></html>
